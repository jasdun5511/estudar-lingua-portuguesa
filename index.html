<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>单词学习</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="nav-left">
            <span class="icon">〈</span>
        </div>
        <div class="nav-title">葡语大纲词汇350...</div>
        <div class="nav-right">
            <span class="icon">🔍</span>
            <span class="icon">👁</span>
            <span class="icon">⋯</span>
        </div>
    </header>

    <div class="sub-header">
        <div class="word-count">▍ 3521词</div>
        <button class="filter-btn">按单元筛选</button>
    </div>

    <div class="section-header">
        A <span class="section-count">289词</span>
    </div>

    <div class="word-list" id="word-list">
        </div>

    <footer class="bottom-bar">
        <div class="tool-item">
            <span class="tool-icon">📚</span>
            <span>沉浸刷词</span>
        </div>
        <div class="tool-item">
            <span class="tool-icon">🎧</span>
            <span>随身听</span>
        </div>
        <div class="tool-item">
            <span class="tool-icon">✍️</span>
            <span>听写</span>
        </div>
        <div class="tool-item">
            <span class="tool-icon">🔤</span>
            <span>随手拼</span>
        </div>
        <div class="tool-item">
            <span class="tool-icon">📄</span>
            <span>导出</span>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
